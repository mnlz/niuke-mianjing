name: Deploy Niuke Mianjing

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-niuke-mianjing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_ENV: ${{ secrets.SERVER_ENV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: niuke-mianjing-frontend/package-lock.json

      - name: Build frontend
        working-directory: niuke-mianjing-frontend
        run: |
          npm ci
          npm run build

      - name: Check backend syntax
        run: python -m compileall -q niuke_mianjing_backend

      - name: Create deploy package
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST:-}" ]; then echo "::error::Missing GitHub secret SERVER_HOST"; exit 1; fi
          if [ -z "${SERVER_USER:-}" ]; then echo "::error::Missing GitHub secret SERVER_USER"; exit 1; fi
          if [ -z "${SERVER_ENV:-}" ]; then echo "::error::Missing GitHub secret SERVER_ENV"; exit 1; fi
          if [ -z "${SERVER_PASSWORD:-}" ] && [ -z "${SERVER_SSH_KEY:-}" ]; then
            echo "::error::Set either SERVER_PASSWORD or SERVER_SSH_KEY"; exit 1
          fi

          rm -rf deploy-package niuke-mianjing-release.tar.gz
          mkdir -p deploy-package/frontend-dist deploy-package/deploy
          cp -r niuke_mianjing_backend deploy-package/
          cp main.py requirements.txt deploy-package/
          cp -r niuke-mianjing-frontend/dist/. deploy-package/frontend-dist/
          cp deploy/remote_deploy.sh deploy-package/deploy/
          printf '%s\n' "$SERVER_ENV" > deploy-package/.env
          tar -czf niuke-mianjing-release.tar.gz -C deploy-package .

      - name: Upload and deploy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          SSH_KEY_ARG=()
          if [ -n "${SERVER_SSH_KEY:-}" ]; then
            printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/niuke_deploy_key
            chmod 600 ~/.ssh/niuke_deploy_key
            SSH_KEY_ARG=(-i ~/.ssh/niuke_deploy_key)
          fi

          remote_scp() {
            if [ -n "${SERVER_SSH_KEY:-}" ]; then
              scp "${SSH_KEY_ARG[@]}" -P "$SERVER_PORT" "$1" "$SERVER_USER@$SERVER_HOST:$2"
            else
              sshpass -p "$SERVER_PASSWORD" scp -P "$SERVER_PORT" "$1" "$SERVER_USER@$SERVER_HOST:$2"
            fi
          }

          remote_ssh() {
            if [ -n "${SERVER_SSH_KEY:-}" ]; then
              ssh "${SSH_KEY_ARG[@]}" -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "$1"
            else
              sshpass -p "$SERVER_PASSWORD" ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "$1"
            fi
          }

          remote_scp niuke-mianjing-release.tar.gz /tmp/niuke-mianjing-release.tar.gz
          remote_ssh "rm -rf /tmp/niuke-deploy && mkdir -p /tmp/niuke-deploy && tar -xzf /tmp/niuke-mianjing-release.tar.gz -C /tmp/niuke-deploy && bash /tmp/niuke-deploy/deploy/remote_deploy.sh"
